services:
    postgres:
        image: postgres:16
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: flagforge
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 5
        ports:
            - '5432:5432'
        volumes:
            - pg_data:/var/lib/postgresql/data
            - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

    redis:
        image: redis:7
        restart: always
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data

    backend:
        build: .
        command: npm run start
        restart: always
        ports:
            - '3000:3000'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
        env_file:
            - .env

volumes:
    pg_data:
    redis_data:
